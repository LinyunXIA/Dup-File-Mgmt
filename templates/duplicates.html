{% extends "base.html" %}
{% block title %}重复文件 - 文件去重管理{% endblock %}
{% block content %}
<div class="page-container">
    <h1>🔍 重复文件</h1>

    <div class="tab-bar">
        <button class="tab-btn active" data-tab="md5-duplicates" onclick="switchTab('md5-duplicates')">MD5 重复</button>
        <button class="tab-btn" data-tab="same-name" onclick="switchTab('same-name')">同名</button>
    </div>

    <!-- Tab 1: MD5 Duplicates -->
    <div id="tab-md5-duplicates" class="tab-content active">
        <div class="toolbar">
            <button class="btn" onclick="showImportModal()">📥 导入</button>
            <button id="generate-rm-btn" class="btn btn-danger" disabled onclick="generateRm()">🗑 生成删除命令</button>
            <span id="selected-count" class="selected-count">已选 0 个</span>
        </div>

        <div id="duplicates-loading" class="loading">加载中...</div>
        <div id="duplicates-list"></div>
    </div>

    <!-- Tab 2: Same Name -->
    <div id="tab-same-name" class="tab-content">
        <div class="toolbar">
            <button class="btn" onclick="scanSameName()">🔍 扫描同名</button>
            <button id="same-name-rm-btn" class="btn btn-danger" disabled onclick="generateRmFromSameName()">🗑 生成删除命令</button>
            <span id="same-name-selected-count" class="selected-count">已选 0 个</span>
        </div>

        <div id="same-name-loading" class="loading" style="display:none;">扫描中...</div>
        <div id="same-name-list"></div>
    </div>
</div>

<!-- Import Modal -->
<div id="import-modal" class="modal" style="display:none;">
    <div class="modal-backdrop" onclick="closeImportModal()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3>📥 导入 md5_list.txt</h3>
            <button class="modal-close" onclick="closeImportModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>模式：</label>
                <select id="import-mode" class="form-select">
                    <option value="first">全量导入（首次）</option>
                    <option value="incremental">增量导入（过滤已有 MD5）</option>
                </select>
            </div>
            <div class="form-group">
                <input type="file" id="import-file" accept=".txt" class="form-input">
            </div>
            <div id="import-progress" style="display:none;">
                <div class="progress-bar"><div class="progress-fill" id="import-progress-fill"></div></div>
                <p id="import-status-text">正在导入...</p>
            </div>
            <div id="import-result" style="display:none;" class="import-result"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" onclick="doImport()" id="import-btn">上传并导入</button>
            <button class="btn btn-secondary" onclick="closeImportModal()">关闭</button>
        </div>
    </div>
</div>
{% endblock %}
