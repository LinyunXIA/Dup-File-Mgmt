{% extends "base.html" %}
{% block title %}资源管理器 - 文件去重管理{% endblock %}
{% block content %}
<div class="page-container">
    <h1>📁 资源管理器</h1>
    <div class="explorer-layout">
        <!-- Left: Directory Tree -->
        <div class="explorer-sidebar">
            <div class="sidebar-header">
                <h3>目录</h3>
                <span class="total-count" id="total-files"></span>
            </div>
            <div id="directory-tree" class="directory-tree"></div>
        </div>

        <!-- Right: File List -->
        <div class="explorer-main">
            <div class="explorer-toolbar">
                <div class="current-dir" id="current-dir-name">全部文件</div>
                <input type="text" id="file-search" class="search-input" placeholder="搜索文件名或路径..." oninput="onSearch()">
            </div>

            <div id="file-list-loading" class="loading">加载中...</div>
            <div id="file-list" class="file-list"></div>

            <div class="batch-bar" id="batch-bar">
                <span id="batch-count">已选 0 个</span>
                <button class="btn" onclick="batchMove()" id="batch-move-btn" disabled>📁 移动到...</button>
                <button class="btn btn-danger" onclick="batchDelete()" id="batch-delete-btn" disabled>🗑 删除</button>
                <button class="btn btn-secondary" onclick="clearSelection()">清空</button>
            </div>
        </div>
    </div>
</div>

<!-- Move Modal -->
<div id="move-modal" class="modal" style="display:none;">
    <div class="modal-backdrop" onclick="closeMoveModal()"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3>📁 移动到...</h3>
            <button class="modal-close" onclick="closeMoveModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <input type="text" id="move-search" class="search-input" placeholder="搜索目录..." oninput="filterMoveDirs()">
            </div>
            <div id="move-dir-list" class="move-dir-list"></div>
            <div id="move-target" class="move-target">未选择目标目录</div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" onclick="generateMove()" id="move-generate-btn" disabled>生成 mv 命令</button>
            <button class="btn btn-secondary" onclick="closeMoveModal()">取消</button>
        </div>
    </div>
</div>
{% endblock %}
